<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Systems — Web Concept</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050506; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #EDE6D6; }

  @keyframes ls-kb {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.12) translate(-1.5%, -1%); }
  }
  @keyframes ls-sweep {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(420%); }
  }
  @keyframes ls-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }
  @keyframes ls-scrollline {
    0%, 100% { transform: scaleY(0.4); transform-origin: top; opacity: 0.5; }
    50%      { transform: scaleY(1); transform-origin: top; opacity: 1; }
  }
  @keyframes ls-rec {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  ::selection { background: #C9A572; color: #0B0B0C; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="brand.jsx"></script>
<script type="text/babel" src="homepage-a.jsx"></script>
<script type="text/babel" src="homepage-b.jsx"></script>
<script type="text/babel" src="homepage-c.jsx"></script>
<script type="text/babel" src="portfolio.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAKS_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#C9A572",
  "density": "spacious",
  "heroLayout": "video",
  "showAll": true
}/*EDITMODE-END*/;

const HOMEPAGES = {
  a: { Comp: HomepageA, letter: 'A', title: 'Cinematic Premium' },
  b: { Comp: HomepageB, letter: 'B', title: 'Industrial Precision' },
  c: { Comp: HomepageC, letter: 'C', title: 'Editorial Calm' },
};

function useHashRoute() {
  const parse = () => {
    const h = (window.location.hash || '').replace(/^#/, '').toLowerCase();
    if (h === 'a' || h === 'b' || h === 'c') return h;
    if (h === 'canvas') return 'canvas';
    return 'portfolio';
  };
  const [route, setRoute] = React.useState(parse);
  React.useEffect(() => {
    const onChange = () => {
      setRoute(parse());
      window.scrollTo({ top: 0, behavior: 'auto' });
    };
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  const navigate = React.useCallback((id) => {
    window.location.hash = id ? `#${id}` : '';
  }, []);
  return [route, navigate];
}

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAKS_DEFAULTS);
  const [route, navigate] = useHashRoute();
  const { accent, density, heroLayout } = tweaks;

  let view;
  if (route === 'portfolio') {
    view = <PortfolioPage accent={accent} density={density} onSelect={navigate} />;
  } else if (route === 'canvas') {
    view = (
      <DesignCanvas title="Line Systems Oy — Verkkosivuehdotus" subtitle="Kolme suuntaa · sukitusala · FI · EN · SV · DA · NO" background="#050506">
        <DCSection id="homepages" title="Etusivu — kolme suuntaa">
          <DCArtboard id="a" label="A · Cinematic premium" width={1440} height={5400}>
            <HomepageA accent={accent} density={density} heroLayout={heroLayout} />
          </DCArtboard>
          <DCArtboard id="b" label="B · Industrial precision" width={1440} height={5200}>
            <HomepageB accent={accent} density={density} heroLayout={heroLayout} />
          </DCArtboard>
          <DCArtboard id="c" label="C · Editorial calm" width={1440} height={6000}>
            <HomepageC accent={accent} density={density} heroLayout={heroLayout} />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  } else {
    const { Comp, letter, title } = HOMEPAGES[route];
    view = (
      <>
        <PortfolioBackBar accent={accent} letter={letter} title={title} onBack={() => navigate('')} />
        <Comp accent={accent} density={density} heroLayout={heroLayout} />
      </>
    );
  }

  return (
    <>
      {view}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Brand">
          <TweakColor label="Accent (kulta/pronssi)" value={tweaks.accent} onChange={v => setTweak('accent', v)} />
        </TweakSection>
        <TweakSection title="Layout">
          <TweakRadio label="Tiheys" value={tweaks.density} onChange={v => setTweak('density', v)} options={[
            { value: 'dense', label: 'Tiheä' },
            { value: 'normal', label: 'Normaali' },
            { value: 'spacious', label: 'Väljä' },
          ]} />
          <TweakRadio label="Hero" value={tweaks.heroLayout} onChange={v => setTweak('heroLayout', v)} options={[
            { value: 'video', label: 'Video' },
            { value: 'image', label: 'Kuva' },
            { value: 'logo', label: 'Logo' },
          ]} />
        </TweakSection>
        <TweakSection title="Quick swatches">
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[
              ['#C9A572', 'Pronssi'],
              ['#D4B57A', 'Vaalea kulta'],
              ['#A8854A', 'Tumma pronssi'],
              ['#E8DCC0', 'Bone'],
              ['#B8956A', 'Antiikkikupari'],
            ].map(([c, n]) => (
              <button key={c} onClick={() => setTweak('accent', c)} style={{
                padding: '8px 12px', background: c, color: '#0B0B0C', border: 0,
                fontSize: 11, letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 600,
                cursor: 'pointer',
              }}>{n}</button>
            ))}
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
