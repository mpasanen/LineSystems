<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #050506; overflow-x: hidden; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #EDE6D6; -webkit-text-size-adjust: 100%; }
  img, video, svg { max-width: 100%; height: auto; }
  /* iOS auto-zooms text inputs whose font-size is below 16px on focus —
     bake the floor in so individual inputs don't have to remember. */
  input, select, textarea { font-size: 16px; }

  @keyframes ls-kb {
    from { transform: scale(1.04) translate(0, 0); }
    to   { transform: scale(1.12) translate(-1.5%, -1%); }
  }
  @keyframes ls-sweep {
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(420%); }
  }
  @keyframes ls-marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-33.333%); }
  }
  @keyframes ls-scrollline {
    0%, 100% { transform: scaleY(0.4); transform-origin: top; opacity: 0.5; }
    50%      { transform: scaleY(1); transform-origin: top; opacity: 1; }
  }
  @keyframes ls-rec {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }
  @keyframes ls-glow {
    0%, 100% { filter: drop-shadow(0 0 24px rgba(201, 165, 114, 0.18)) drop-shadow(0 0 60px rgba(201, 165, 114, 0.08)); }
    50%      { filter: drop-shadow(0 0 36px rgba(201, 165, 114, 0.32)) drop-shadow(0 0 90px rgba(201, 165, 114, 0.14)); }
  }
  ::selection { background: #C9A572; color: #0B0B0C; }
</style>

<!-- Initial static skeleton — paints at FCP (~200ms) before the React bundle
     finishes downloading + executing, so the user isn't staring at a black
     page for 3+ seconds on slow networks. React.createRoot().render() wipes
     this on its first commit.
     Layout matches the eventual top header (wordmark left, padding from edges)
     so when React replaces it with the real header the cumulative layout
     shift stays low. -->
<div id="root">
  <div style="min-height:100vh;background:#0B0B0C;color:#EDE6D6;font-family:'Inter',system-ui,sans-serif">

        <polygon points="50,48 92,92 46,92" fill="#C9A572"/>
      </svg>
      <span style="font-family:'Cormorant Garamond','Times New Roman',serif;font-weight:300;letter-spacing:0.34em;font-size:13px;text-transform:uppercase;line-height:1">Line Systems</span>
    </div>
    <noscript style="display:block;padding:36px 20px;font-size:14px;color:#c9c2b6;max-width:42ch">
      Tämä sivu vaatii JavaScriptin. <a href="tel:+358503264439" style="color:#C9A572">Soita: 050 326 4439</a>
    </noscript>
  </div>
</div>
